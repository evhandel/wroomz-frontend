# Limit worker processes for low RAM usage
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    server {
        listen ${PORT};
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # PostHog reverse proxy — analytics is sent to our own /ingest path so
        # ad blockers don't drop events (they block *.posthog.com directly).
        # ^~ stops the static-asset regex location above from hijacking
        # /ingest/static/*.js. See src/analytics/posthog.ts (api_host).
        location ^~ /ingest/static/ {
            proxy_pass https://eu-assets.i.posthog.com/static/;
            proxy_set_header Host eu-assets.i.posthog.com;
            proxy_ssl_server_name on;
        }
        location ^~ /ingest/ {
            proxy_pass https://eu.i.posthog.com/;
            proxy_set_header Host eu.i.posthog.com;
            proxy_ssl_server_name on;
        }

        # SPA routing - redirect all requests to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
